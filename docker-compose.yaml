services:
    trigger_nginx:
        image: nginx
        container_name: soat-trigger-nginx
        ports:
            - 8003:80
        hostname: soat-trigger-nginx-hostname
        restart: on-failure:3
        volumes:
            - ./docker/containers/nginx/nginx.conf:/etc/nginx/nginx.conf
            - ./application:/var/www/html
        depends_on:
            trigger:
                condition: service_healthy
                restart: true

    trigger:
        container_name: soat-trigger
        hostname: soat-trigger-hostname
        build:
            context: .
            dockerfile: ./docker/images/php/Dockerfile
        environment:
            OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
            OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
            OTEL_SERVICE_NAME: soat-trigger
            OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local,service.namespace=soat
            OTEL_TRACES_EXPORTER: otlp
            OTEL_METRICS_EXPORTER: otlp
            OTEL_LOGS_EXPORTER: otlp
            LOG_STACK: single,otel
        volumes:
            - ./application:/var/www/html
        restart: on-failure:3
        expose:
            - "9000"
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep pong || exit 1",
                ]
            interval: 5s
            timeout: 3s
            start_period: 300s
            retries: 3
        depends_on:
            trigger_pg:
                condition: service_healthy
                restart: true

    trigger_protocols_worker:
        container_name: soat-trigger-protocols-worker
        hostname: soat-trigger-protocols-worker-hostname
        build:
            context: .
            dockerfile: ./docker/images/php/Dockerfile
        command: ["php", "artisan", "consume:protocols"]
        environment:
            OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
            OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
            OTEL_SERVICE_NAME: soat-trigger-protocols-worker
            OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local,service.namespace=soat
            OTEL_TRACES_EXPORTER: otlp
            OTEL_METRICS_EXPORTER: otlp
            OTEL_LOGS_EXPORTER: otlp
            LOG_STACK: single,otel
        volumes:
            - ./application:/var/www/html
        restart: on-failure:3
        depends_on:
            trigger:
                condition: service_healthy
                restart: true
            trigger_pg:
                condition: service_healthy
                restart: true

    trigger_analysis_response_worker:
        container_name: soat-trigger-analysis-response-worker
        hostname: soat-trigger-analysis-response-worker-hostname
        build:
            context: .
            dockerfile: ./docker/images/php/Dockerfile
        command: ["php", "artisan", "consume:analysis-response"]
        environment:
            OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
            OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
            OTEL_SERVICE_NAME: soat-trigger-analysis-response-worker
            OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local,service.namespace=soat
            OTEL_TRACES_EXPORTER: otlp
            OTEL_METRICS_EXPORTER: otlp
            OTEL_LOGS_EXPORTER: otlp
            LOG_STACK: single,otel
        volumes:
            - ./application:/var/www/html
        restart: on-failure:3
        depends_on:
            trigger:
                condition: service_healthy
                restart: true
            trigger_pg:
                condition: service_healthy
                restart: true

    trigger_pg:
        image: postgres:17.5
        container_name: soat-trigger-pg
        restart: always
        ports:
            - 5434:5432
        env_file:
            - ./docker/containers/pg/env/.env.dev
        volumes:
            - trigger_pg_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 5s

volumes:
  trigger_pg_data:

networks:
    default:
        external: true
        name: soat-net
